services:
  # Backend (Web Service)
  - type: web
    name: mon-api-backend
    rootDir: Le-Format/backend
    runtime: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn app.main:app -w 4 -k uvicorn.workers.UvicornWorker"
    envVars:
      - key: PORT
        value: "8000"

  # Frontend (Static Site estriktire kòm Web Service pou Blueprint)
  - type: web
    name: mon-frontend-react
    rootDir: Le-Format/frontend
    runtime: node
    buildCommand: "npm install && npm run build"
    # Sèvi ak yon sèvè estatik ki lejè (serve)
    startCommand: "npx serve -s dist"
    envVars:
      - key: PORT
        value: "3000"